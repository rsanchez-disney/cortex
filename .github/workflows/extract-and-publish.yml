name: Cortex Extract & Publish

on:
  workflow_dispatch:
    inputs:
      config:
        description: "Repos config file to use"
        default: "config/repos-real.yaml"
      debug_auth_only:
        description: "TEMP: skip extraction/publish, only print OIDC token claims"
        type: boolean
        default: false
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC nightly (mirrors azure-pipelines.yml)

# Avoid overlapping runs writing to Firestore simultaneously
concurrency:
  group: cortex-extract-publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write          # REQUIRED for WIF OIDC

jobs:
  extract-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CONFIG_FILE: ${{ github.event.inputs.config || 'config/repos-real.yaml' }}
      OUTPUT_DIR: ${{ github.workspace }}/cortex-output
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      FIRESTORE_DATABASE: ${{ vars.FIRESTORE_DATABASE || 'cortex' }}
    steps:
      - uses: actions/checkout@v4

      # TEMP DEBUG: print the OIDC token's iss/aud so the GCP WIF provider can be
      # configured to match the globant-emu enterprise issuer. Remove once auth works.
      - name: Debug OIDC token claims
        if: ${{ github.event.inputs.debug_auth_only == 'true' }}
        run: |
          TOKEN="$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://github.com/CA-LAC059-P1" | python3 -c 'import sys,json; print(json.load(sys.stdin)["value"])')"
          PAYLOAD="$(printf '%s' "$TOKEN" | cut -d. -f2)"
          # base64url decode (pad as needed)
          PAD=$(( ${#PAYLOAD} % 4 )); [ $PAD -ne 0 ] && PAYLOAD="${PAYLOAD}$(printf '=%.0s' $(seq $((4-PAD))))"
          echo "$PAYLOAD" | tr '_-' '/+' | base64 -d 2>/dev/null | python3 -m json.tool

      - name: Install uv
        if: ${{ github.event.inputs.debug_auth_only != 'true' }}
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: ${{ github.event.inputs.debug_auth_only != 'true' }}
        run: uv sync --extra ios          # ios extra needed: repos-real.yaml has ios repos

      - name: Run extraction + aggregation
        if: ${{ github.event.inputs.debug_auth_only != 'true' }}
        env:
          AZURE_PAT: ${{ secrets.AZURE_PAT }}
        run: |
          uv run cortex run-local \
            --config "$CONFIG_FILE" \
            --output-dir "$OUTPUT_DIR"

      - name: Upload extraction output as artifact
        if: ${{ always() && github.event.inputs.debug_auth_only != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: cortex-output
          path: cortex-output/
          retention-days: 14

      - name: Authenticate to Google Cloud (WIF)
        if: ${{ github.event.inputs.debug_auth_only != 'true' }}
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}
          # globant-emu enterprise issues OIDC tokens with this fixed audience;
          # it must match --allowed-audiences on the GCP WIF provider.
          audience: "https://github.com/CA-LAC059-P1"

      - name: Publish to Firestore
        if: ${{ github.event.inputs.debug_auth_only != 'true' }}
        run: |
          ./scripts/upload-to-firestore.sh "$OUTPUT_DIR" "$FIRESTORE_DATABASE"
