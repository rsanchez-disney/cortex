spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/demo_db
    username: demo
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: demo-group

kafka:
  topics:
    order-created: demo.orders.created
    order-cancelled: demo.orders.cancelled
    order-shipped: "${ORDER_SHIPPED_TOPIC:demo.orders.shipped}"

spring:
  cloud:
    azure:
      cosmos:
        endpoint: https://example.documents.azure.com:443/
        key: ${COSMOS_KEY:dummy-key}
        database: example-db

services:
  rewards:
    base-url: https://rewards-service.internal

# Outbound service integrations with env-var-only URLs (Change 1 test)
notifications:
  base-uri: ${NOTIFICATIONS_SERVICE_BASE_URI:}

ticketing:
  base-uri: ${TICKETING_SERVICE_BASE_URI:}

partner-api:
  base-url: ${PARTNER_API_BASE_URL}

server:
  port: 8080
