# Real repo config — points to actual project clones for local testing.
# Replace paths/URLs below with your actual local clones or Azure DevOps URLs.
# For URL entries, set the AZURE_PAT environment variable.
repos:

  - name: mobile-apps-android
    url: https://IntuitDome@dev.azure.com/IntuitDome/FanApp/_git/mobile-apps-android
    type: android
    owner: team-mobile
    domain: entertainment
    tier: critical
    purpose: Main Android LA Clippers application.

  # The iOS repo contains a single Xcode project (App/LaLiga.xcodeproj) with two
  # app targets: LaClippers (FanApp) and LACStaff (StaffApp). We configure them as
  # separate Atlas services using extractor_hints.project_root + extractor_hints.target
  # so each gets its own scoped manifest.

  - name: fan-app-ios
    url: https://IntuitDome@dev.azure.com/IntuitDome/FanApp/_git/mobile-apps-ios
    type: ios
    owner: team-mobile
    domain: entertainment
    tier: critical
    purpose: LA Clippers FanApp — fan-facing iOS application for ticketing, loyalty, payments, suite management and arena experiences.
    keywords:
      - ios
      - fanapp
      - clippers
      - ticketing
      - loyalty
    extractor_hints:
      project_root: "App"
      target: "LaClippers"

  - name: staff-app-ios
    url: https://IntuitDome@dev.azure.com/IntuitDome/FanApp/_git/mobile-apps-ios
    type: ios
    owner: team-mobile
    domain: entertainment
    tier: critical
    purpose: LA Clippers StaffApp — internal iOS application for staff and operations personnel at Intuit Dome.
    keywords:
      - ios
      - staffapp
      - clippers
      - operations
    extractor_hints:
      project_root: "App"
      target: "LACStaff"

  # ---------------------------------------------------------------------------
  # IntuitDome backend microservices — Java 17 / Spring Boot 3.x / Gradle
  # ---------------------------------------------------------------------------

  - name: identity-microservice
    url: https://dev.azure.com/IntuitDome/identity-microservice/_git/identity-microservice
    type: backend-java
    owner: team-backend
    domain: identity
    tier: critical
    purpose: Identity management, account CRUD, authentication, NFC/NBA integrations

  - name: accesscontrol-microservice
    url: https://dev.azure.com/IntuitDome/accesscontrol-microservice/_git/accesscontrol-microservice
    type: backend-java
    owner: team-backend
    domain: access-control
    tier: critical
    purpose: Access validation, parking events, AiFi zone detection

  - name: payments-microservice
    url: https://dev.azure.com/IntuitDome/payments-microservice/_git/payments-microservice
    type: backend-java
    owner: team-backend
    domain: payments
    tier: critical
    purpose: Payment methods, transactions, invoices, chargebacks

  - name: frictionless-commerce-microservice
    url: https://dev.azure.com/IntuitDome/frictionless-commerce-microservice/_git/frictionless-commerce-microservice
    type: backend-java
    owner: team-backend
    domain: commerce
    tier: critical
    purpose: Frictionless checkout sessions, AiFi integration, POS

  - name: loyalty-microservice
    url: https://dev.azure.com/IntuitDome/loyalty-microservice/_git/loyalty-microservice
    type: backend-java
    owner: team-backend
    domain: loyalty
    tier: standard
    purpose: Loyalty points, rewards, achievements, leaderboards, badges

  - name: loyalty-sa-microservice
    url: https://dev.azure.com/IntuitDome/loyalty-sa-microservice/_git/loyalty-sa-microservice
    type: backend-java
    owner: team-backend
    domain: loyalty
    tier: standard
    purpose: Real-time data feeds for loyalty (NBA, sound levels, clock)

  - name: entitlements-microservice
    url: https://dev.azure.com/IntuitDome/entitlements-microservice/_git/entitlements-microservice
    type: backend-java
    owner: team-backend
    domain: entitlements
    tier: critical
    purpose: Entitlement assignment, redemption, transfer, expiration

  - name: suites-microservice
    url: https://dev.azure.com/IntuitDome/suites-microservice/_git/suites-microservice
    type: backend-java
    owner: team-backend
    domain: suites
    tier: critical
    purpose: Suite management, packages, guest passes, HVAC/lighting, invitations

  - name: ticketing-microservice
    url: https://dev.azure.com/IntuitDome/_git/ticketing-microservice
    type: backend-java
    owner: team-backend
    domain: ticketing
    tier: critical
    purpose: Ticketing management, seat inventory, reservations, event access
