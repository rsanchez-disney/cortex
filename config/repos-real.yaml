# Real repo config — points to actual project clones for local testing.
# Replace paths/URLs below with your actual local clones or Azure DevOps URLs.
# For URL entries, set the AZURE_PAT environment variable.
#
# Swagger URL formula (backend-java services, Dev environment):
#   https://asv{region}{env}{webapp_name}.azurewebsites.net/{webapp_name}/v3/api-docs
#
# Region acronym is determined by the Azure App Service Plan assigned to the service:
#   aw3  → West US 3 (westus3) — used by most services
#   awu  → West US   (westus)  — used by identity and ambientcontrol (app_service_index=5)
#
# To add a new service, look up its app_service_index in the IaC terraform.tfvars
# (app_service_<name> variable) to determine the region acronym, then compute:
#   region = "awu" if index == 5 else "aw3"
#   swagger_url = f"https://asv{region}dev{webapp_name}.azurewebsites.net/{webapp_name}/v3/api-docs"
repos:

  - name: mobile-apps-android
    url: https://IntuitDome@dev.azure.com/IntuitDome/FanApp/_git/mobile-apps-android
    type: android
    owner: team-mobile
    domain: entertainment
    tier: critical
    purpose: Main Android LA Clippers application.

  # ---------------------------------------------------------------------------
  # IntuitDome backend microservices — Java 17 / Spring Boot 3.x / Gradle
  #
  # Swagger URL formula (dev environment):
  #   https://asv{region}dev{webapp_name}.azurewebsites.net/{webapp_name}/v3/api-docs
  # ---------------------------------------------------------------------------

  - name: accesscontrol-microservice
    url: https://dev.azure.com/IntuitDome/accesscontrol-microservice/_git/accesscontrol-microservice
    type: backend-java
    owner: team-backend
    domain: access-control
    tier: critical
    purpose: Validates fan/staff access at arena entry points (NFC, biometric, tap-to-pay), resolves parking events via license plate recognition, and handles AiFi zone entry for frictionless commerce. Integrates with identity, ticketing, payments, entitlements, credential, loyalty, and Paravision (facial recognition).
    swagger_url: https://asvaw3devaccesscontrol.azurewebsites.net/accesscontrol/v3/api-docs

  - name: accesscontrol-processor-microservice
    url: https://dev.azure.com/IntuitDome/accesscontrol-microservice/_git/accesscontrol-processor-microservice
    type: backend-java
    owner: team-backend
    domain: access-control
    tier: critical
    purpose: Consumes access-control and anti-spoofing Kafka events for persistence and historical analysis. Runs scheduled jobs for biometric data clearing (Paravision), deleted account history sync, and historical fan event aggregation. Sends anti-spoofing alerts to MS Teams.
    swagger_url: https://asvaw3devaccesscontrolprocessor.azurewebsites.net/accesscontrolprocessor/v3/api-docs

  - name: admin-tool
    url: https://dev.azure.com/IntuitDome/admin-tool/_git/admin-tool-back
    type: backend-java
    owner: team-backend
    domain: access-control
    tier: standard
    purpose: BFF for the admin web portal, aggregating 10+ downstream services (identity, ticketing, entitlements, back-of-house, suites, staff, locations, configuration, IoT, notifications). Manages settings, entitlement promises by section/event, AEM content fetching, and Adobe CMS integration.
    swagger_url: https://asvaw3devadmintool.azurewebsites.net/admintool/v3/api-docs

  - name: ambientcontrol-microservice
    url: https://dev.azure.com/IntuitDome/ambient-control-microservice/_git/ambient-control-microservice
    type: backend-java
    owner: team-backend
    domain: arena-experience
    tier: standard
    purpose: Controls suite and bowl-section HVAC temperature and lighting via Schneider Electric BMS integration. Manages fan temperature polls (vote hot/cold per seat section) with scheduled evaluation. Consumes NBA play-by-play events for game-reactive automation.
    swagger_url: https://asvawudevambientcontrol.azurewebsites.net/ambientcontrol/v3/api-docs

  - name: backofhouse-microservice
    url: https://dev.azure.com/IntuitDome/backofhouse-microservice/_git/backofhouse-microservice
    type: backend-java
    owner: team-backend
    domain: operations
    tier: standard
    purpose: Manages Genetec physical access control system integration — cardholder groups, credential entities, door activity reports, and cardholder sync. Runs scheduled jobs for credential clearing, cardholder sync, and Genetec interface activation.
    swagger_url: https://asvaw3devbackofhouse.azurewebsites.net/backofhouse/v3/api-docs

  - name: commerce-microservice
    url: https://dev.azure.com/IntuitDome/commerce-microservice/_git/commerce-microservice
    type: backend-java
    owner: team-backend
    domain: commerce
    tier: critical
    purpose: Manages in-venue retail commerce — product catalogs, ordering, and Microsoft Dynamics 365 POS integration. Consumes Kafka events from Microsoft commerce, entitlements, and ticketing for order lifecycle management. Integrates with payments, locations, suites, identity, and notifications.
    swagger_url: https://asvaw3devcommerce.azurewebsites.net/commerce/v3/api-docs

  - name: configuration-microservice
    url: https://dev.azure.com/IntuitDome/configuration-microservice/_git/configuration-microservice
    type: backend-java
    owner: team-backend
    domain: platform
    tier: standard
    purpose: CRUD API for Azure App Configuration key-value entries with label-based filtering. Provides health check, cache invalidation, and key/label lookup endpoints. Backed by Azure App Configuration SDK with Redis caching — no database, no Kafka.
    swagger_url: https://asvaw3devconfiguration.azurewebsites.net/configuration/v3/api-docs

  - name: credentialid-microservice
    url: https://dev.azure.com/IntuitDome/credentialid-integration-microservice/_git/credentialid-integration-microservice
    type: backend-java
    owner: team-backend
    domain: identity
    tier: critical
    purpose: Manages Apple Wallet pass lifecycle — issuance, updates, and revocation of digital NFC credentials. Consumes Kafka events for identity changes and entitlement lifecycle to keep passes in sync. Integrates with Apple onboarding APIs and Paravision for biometric enrollment.
    swagger_url: https://asvaw3devcredentialid.azurewebsites.net/credentialid/v3/api-docs

  - name: datams-microservice
    url: https://dev.azure.com/IntuitDome/data-microservice/_git/data-microservice
    type: backend-java
    owner: team-backend
    domain: data
    tier: standard
    purpose: Kafka Streams processor for data transformation pipelines — reads from input topics and writes to output topics. Minimal service with no REST API endpoints, no database, and no outbound HTTP calls.
    swagger_url: https://asvaw3devdatams.azurewebsites.net/datams/v3/api-docs

  - name: entitlements-microservice
    url: https://dev.azure.com/IntuitDome/entitlements-microservice/_git/entitlements-microservice
    type: backend-java
    owner: team-backend
    domain: entitlements
    tier: critical
    purpose: Manages fan entitlements (parking, club access, suite access, rewards) — creation, redemption, transfer, update, deletion, and scheduled expiration. Produces lifecycle events to 7 Kafka topics and consumes creation requests, identity upgrades, and account deletions.
    swagger_url: https://asvaw3deventitlements.azurewebsites.net/entitlements/v3/api-docs

  - name: evcharge-microservice
    url: https://dev.azure.com/IntuitDome/ev-charge-microservice/_git/ev-charge-microservice
    type: backend-java
    owner: team-backend
    domain: parking
    tier: standard
    purpose: Manages EV charging sessions using OCPI protocol — syncs charger locations and tariffs from Greenlots CPO, tracks charging sessions, and pushes session events and notifications via Kafka. Integrates with identity service for user lookup.
    swagger_url: https://asvaw3devevcharge.azurewebsites.net/evcharge/v3/api-docs

  - name: frictionless-commerce-microservice
    url: https://dev.azure.com/IntuitDome/frictionless-commerce-microservice/_git/frictionless-commerce-microservice
    type: backend-java
    owner: team-backend
    domain: commerce
    tier: critical
    purpose: Orchestrates cashierless just-walk-out shopping in AiFi-powered stores — manages shopper sessions, fan recognition at IDAP devices, payment method validation, and cart/receipt processing. Consumes 12 Kafka topics and integrates with AiFi OASIS API, queue management, identity, payments, and entitlements.
    swagger_url: https://asvaw3devfrictionlesscommerce.azurewebsites.net/frictionlesscommerce/v3/api-docs

  - name: geoinfo-microservice
    url: https://dev.azure.com/IntuitDome/geoinfo-microservice/_git/geoinfo-microservice
    type: backend-java
    owner: team-backend
    domain: geo-info
    tier: standard
    purpose: ZIP/postal code country validation via Google Maps Geocoding API with Redis caching
    swagger_url: https://asvaw3devgeoinfo.azurewebsites.net/geoinfo/v3/api-docs

  - name: identity-microservice
    url: https://dev.azure.com/IntuitDome/identity-microservice/_git/identity-microservice
    type: backend-java
    owner: team-backend
    domain: identity
    tier: critical
    purpose: Central identity service — manages fan/staff accounts (CRUD, linking, upgrade, deletion, blocking), age verification via CLEAR, biometric enrollment via Paravision, NBA CIAM account linking, and Apple Wallet credential sync. Produces 6 Kafka identity lifecycle events and consumes 8 topics.
    swagger_url: https://asvawudevidentity.azurewebsites.net/identity/v3/api-docs

  - name: incident-microservice
    url: https://dev.azure.com/IntuitDome/incidents-microservice/_git/incidents-microservice
    type: backend-java
    owner: team-backend
    domain: operations
    tier: standard
    purpose: Proxies incident management operations to IMS247 (third-party incident management system) — creates/retrieves incidents, fetches priority levels and resolution codes. No Kafka, no database — pure API gateway to IMS247 with Redis caching.
    swagger_url: https://asvaw3devincident.azurewebsites.net/incident/v3/api-docs

  - name: locations-microservice
    url: https://dev.azure.com/IntuitDome/locations-microservice/_git/locations-microservice
    type: backend-java
    owner: team-backend
    domain: locations
    tier: critical
    purpose: Venue location catalog (stores, clubs, suites, parkings, entrances), port/IDAP device management, IoT device twins sync
    swagger_url: https://asvaw3devlocationsmicroservice.azurewebsites.net/locationsmicroservice/v3/api-docs

  - name: loyalty-microservice
    url: https://dev.azure.com/IntuitDome/loyalty-microservice/_git/loyalty-microservice
    type: backend-java
    owner: team-backend
    domain: loyalty
    tier: standard
    purpose: Manages the PlayFab-backed loyalty program — points accrual, rewards, achievements, leaderboards, badges, seat pairing, and discount code generation via Microsoft Dynamics. Consumes Kafka events from access control, seat presence, payments, ticketing, and PlayFab playstream.
    swagger_url: https://asvaw3devloyalty.azurewebsites.net/loyalty/v3/api-docs

  - name: loyalty-sa-microservice
    url: https://dev.azure.com/IntuitDome/loyalty-sa-microservice/_git/loyalty-sa-microservice
    type: backend-java
    owner: team-backend
    domain: loyalty
    tier: standard
    purpose: Standalone data ingestion service for the loyalty system — polls NBA game data, Sorama sound level sensors, and game clock feeds, then publishes events to Kafka topics for downstream loyalty processing. No REST API consumers — purely a producer/scheduler service.
    swagger_url: https://asvaw3devloyaltysa.azurewebsites.net/loyaltysa/v3/api-docs

  - name: nba-microservice
    url: https://dev.azure.com/IntuitDome/nba-microservice/_git/nba-microservice
    type: backend-java
    owner: team-backend
    domain: entertainment
    tier: standard
    purpose: Fetches live NBA game data (scores, play-by-play, schedules, player stats) from the NBA API and publishes events to Kafka. Integrates with WSC Sports for video highlights and pushes game data to Adobe Experience Platform via HTTP data streams.
    swagger_url: https://asvaw3devnba.azurewebsites.net/nba/v3/api-docs

  - name: notifications-microservice
    url: https://dev.azure.com/IntuitDome/notifications-microservice/_git/notifications-microservice
    type: backend-java
    owner: team-backend
    domain: notifications
    tier: standard
    purpose: Multi-channel notification delivery — push notifications via Apple APNs, SMS via Infobip, email via Azure Communication Services, and journey-triggered messages via Adobe Journey Optimizer (AJO). Consumes Kafka events for push requests and NBA game events.
    swagger_url: https://asvaw3devnotifications.azurewebsites.net/notifications/v3/api-docs

  - name: offlinecache-microservice
    url: https://dev.azure.com/IntuitDome/offlinecache-microservice/_git/offlinecache-microservice
    type: backend-java
    owner: team-backend
    domain: platform
    tier: standard
    purpose: Pre-computes and caches fan-specific data bundles (entitlements, identity, tickets, biometric records) for offline/low-latency mobile access. Consumes entitlement creation events from Kafka to trigger cache refresh.
    swagger_url: https://asvaw3devofflinecache.azurewebsites.net/offlinecache/v3/api-docs

  - name: payments-microservice
    url: https://dev.azure.com/IntuitDome/payments-microservice/_git/payments-microservice
    type: backend-java
    owner: team-backend
    domain: payments
    tier: critical
    purpose: Manages payment methods (card tokenization via Chase/JPMorgan, Apple Pay wallet decryption), processes transactions through Microsoft Dynamics 365 Commerce (cart creation, order history, refunds), and handles chargeback uploads. Produces 7 Kafka event types.
    swagger_url: https://asvaw3devpayments.azurewebsites.net/payments/v3/api-docs

  - name: preferences-microservice
    url: https://dev.azure.com/IntuitDome/preferences-microservice/_git/preferences-microservice
    type: backend-java
    owner: team-backend
    domain: identity
    tier: standard
    purpose: Manages fan communication consent preferences (email, SMS, push) and profile data, syncing them to Adobe Experience Platform (AEP) via Kafka. Consumes identity account creation events and AEP consent blob events.
    swagger_url: https://asvaw3devpreferences.azurewebsites.net/preferences/v3/api-docs

  - name: purchasenotifications-microservice
    url: https://dev.azure.com/IntuitDome/purchase-notifications-microservice/_git/purchase-notifications-microservice
    type: backend-java
    owner: team-backend
    domain: commerce
    tier: standard
    purpose: Consumes anonymous purchase events from Kafka and sends transactional purchase receipts via Adobe Journey Optimizer (AJO). Fetches order details from Microsoft Dynamics 365 Commerce to enrich notification payloads. Stateless event processor — no database.
    swagger_url: https://asvaw3devpurchasenotifications.azurewebsites.net/purchasenotifications/v3/api-docs

  - name: queuemanagement-microservice
    url: https://dev.azure.com/IntuitDome/queue-management-microservice/_git/queue-management-microservice
    type: backend-java
    owner: team-backend
    domain: operations
    tier: standard
    purpose: Manages virtual queues for arena locations — fan queue enrollment, position tracking, resolution (admit/reject), and dead-letter handling. Produces queue resolution events consumed by access-control and frictionless-commerce.
    swagger_url: https://asvaw3devqueuemanagement.azurewebsites.net/queuemanagement/v3/api-docs

  - name: replayengine-microservice
    url: https://dev.azure.com/IntuitDome/replay-engine-microservice/_git/replay-engine-microservice
    type: backend-java
    owner: team-backend
    domain: entertainment
    tier: standard
    purpose: Consumes multiple real-time Kafka streams (seat pairing, NBA play-by-play, sound levels, commerce events, fan classification, PlayFab) to drive personalized in-seat replay experiences. Integrates with identity and Microsoft Dynamics 365 Commerce for fan context.
    swagger_url: https://asvaw3devreplayengine.azurewebsites.net/replayengine/v3/api-docs

  - name: seatpresence-microservice
    url: https://dev.azure.com/IntuitDome/seat-presence-microservice/_git/seat-presence-microservice
    type: backend-java
    owner: team-backend
    domain: access-control
    tier: standard
    purpose: Tracks real-time seat occupancy by consuming access-control entry events from Kafka, then produces seat-presence and loyalty-seat-pairing events for downstream services. No outbound HTTP calls — pure event-driven processor backed by Cosmos DB.
    swagger_url: https://asvaw3devseatpresence.azurewebsites.net/seatpresence/v3/api-docs

  - name: staff-microservice
    url: https://dev.azure.com/IntuitDome/staff-microservice/_git/staff-microservice
    type: backend-java
    owner: team-backend
    domain: operations
    tier: standard
    purpose: Manages staff member profiles, roles, and organizational data. Consumes Kafka events for identity account deletion and upgrade to keep staff records in sync. Self-contained CRUD service backed by Cosmos DB.
    swagger_url: https://asvaw3devstaff.azurewebsites.net/staff/v3/api-docs

  - name: suites-microservice
    url: https://dev.azure.com/IntuitDome/suites-microservice/_git/suites-microservice
    type: backend-java
    owner: team-backend
    domain: suites
    tier: critical
    purpose: Manages premium suite lifecycle — suite packages, guest pass invitations, event-day settings, and suite holder management. Consumes 7 Kafka topics for identity changes, location config, and ticketing events. Integrates with 10 downstream services including ambient-control for HVAC/lighting.
    swagger_url: https://asvaw3devsuites.azurewebsites.net/suites/v3/api-docs

  - name: ticketing-microservice
    url: https://dev.azure.com/IntuitDome/_git/ticketing-microservice
    type: backend-java
    owner: team-backend
    domain: ticketing
    tier: critical
    purpose: Manages event ticketing — ticket inventory, seat maps, purchases, redemptions, transfers, squad/sit-with-friends features, and attendance tracking. Integrates with Ticketmaster Presence and produces 11 Kafka event topics. Uses PostgreSQL (163 Flyway migrations) as primary database.
    swagger_url: https://asvaw3devticketing.azurewebsites.net/ticketing/v3/api-docs

  # The iOS repo contains a single Xcode project (App/LaLiga.xcodeproj) with two
  # app targets: LaClippers (FanApp) and LACStaff (StaffApp). We configure them as
  # separate Cortex services using extractor_hints.project_root + extractor_hints.target
  # so each gets its own scoped manifest.

  - name: fan-app-ios
    url: https://IntuitDome@dev.azure.com/IntuitDome/FanApp/_git/mobile-apps-ios
    type: ios
    owner: team-mobile
    domain: entertainment
    tier: critical
    purpose: LA Clippers FanApp — fan-facing iOS application for ticketing, loyalty, payments, suite management and arena experiences.
    keywords:
      - ios
      - fanapp
      - clippers
      - ticketing
      - loyalty
    extractor_hints:
      project_root: "App"
      target: "LaClippers"

  - name: staff-app-ios
    url: https://IntuitDome@dev.azure.com/IntuitDome/FanApp/_git/mobile-apps-ios
    type: ios
    owner: team-mobile
    domain: entertainment
    tier: critical
    purpose: LA Clippers StaffApp — internal iOS application for staff and operations personnel at Intuit Dome.
    keywords:
      - ios
      - staffapp
      - clippers
      - operations
    extractor_hints:
      project_root: "App"
      target: "LACStaff"
