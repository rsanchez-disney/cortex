# Real repo config — points to actual project clones for local testing.
# Replace paths/URLs below with your actual local clones or Azure DevOps URLs.
# For URL entries, set the AZURE_PAT environment variable.
#
# Swagger URL formula (backend-java services, Dev environment):
#   https://asv{region}{env}{webapp_name}.azurewebsites.net/{webapp_name}/v3/api-docs
#
# Region acronym is determined by the Azure App Service Plan assigned to the service:
#   aw3  → West US 3 (westus3) — used by most services
#   awu  → West US   (westus)  — used by identity and ambientcontrol (app_service_index=5)
#
# To add a new service, look up its app_service_index in the IaC terraform.tfvars
# (app_service_<name> variable) to determine the region acronym, then compute:
#   region = "awu" if index == 5 else "aw3"
#   swagger_url = f"https://asv{region}dev{webapp_name}.azurewebsites.net/{webapp_name}/v3/api-docs"
repos:

  - name: mobile-apps-android
    url: https://IntuitDome@dev.azure.com/IntuitDome/FanApp/_git/mobile-apps-android
    type: android
    owner: team-mobile
    domain: entertainment
    tier: critical
    purpose: Main Android LA Clippers application.

  # The iOS repo contains a single Xcode project (App/LaLiga.xcodeproj) with two
  # app targets: LaClippers (FanApp) and LACStaff (StaffApp). We configure them as
  # separate Cortex services using extractor_hints.project_root + extractor_hints.target
  # so each gets its own scoped manifest.

  - name: fan-app-ios
    url: https://IntuitDome@dev.azure.com/IntuitDome/FanApp/_git/mobile-apps-ios
    type: ios
    owner: team-mobile
    domain: entertainment
    tier: critical
    purpose: LA Clippers FanApp — fan-facing iOS application for ticketing, loyalty, payments, suite management and arena experiences.
    keywords:
      - ios
      - fanapp
      - clippers
      - ticketing
      - loyalty
    extractor_hints:
      project_root: "App"
      target: "LaClippers"

  - name: staff-app-ios
    url: https://IntuitDome@dev.azure.com/IntuitDome/FanApp/_git/mobile-apps-ios
    type: ios
    owner: team-mobile
    domain: entertainment
    tier: critical
    purpose: LA Clippers StaffApp — internal iOS application for staff and operations personnel at Intuit Dome.
    keywords:
      - ios
      - staffapp
      - clippers
      - operations
    extractor_hints:
      project_root: "App"
      target: "LACStaff"

