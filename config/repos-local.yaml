# Local development config — supports both local paths and remote URLs.
# For URL entries, set the AZURE_PAT environment variable.
# Use repos-fixtures.yaml for smoke tests with sample data.
repos:
  # Option A: pre-cloned local path (no PAT needed)
  # - name: mobile-banking-android
  #   path: /path/to/your/local/clone
  #   type: android
  #   owner: team-mobile
  #   domain: payments
  #   tier: critical
  #   purpose: Main Android banking app

  # Option B: remote URL (AZURE_PAT env var must be set)
  # - name: mobile-banking-ios
  #   url: https://dev.azure.com/org/project/_git/repo-name
  #   type: ios
  #   owner: team-mobile
  #   domain: payments
  #   tier: critical
  #   purpose: Main iOS banking app

  # Option C: remote URL on a specific branch (AZURE_PAT env var must be set)
  # - name: my-app-staging
  #   url: https://dev.azure.com/org/project/_git/my-app
  #   branch: develop          # optional — omit to clone the default branch
  #   type: android
  #   owner: team-mobile
  #   domain: payments
  #   tier: standard
  #   purpose: Staging Android app on the develop branch

  # Option E: backend Java/Spring Boot service (local path)
  # - name: my-java-service
  #   path: /path/to/your/local/clone
  #   type: backend-java
  #   owner: team-backend
  #   domain: payments
  #   tier: critical
  #   purpose: Spring Boot microservice for payments processing

  # Using test fixtures as defaults
  - name: sample-android
    path: tests/fixtures/sample-android-repo
    type: android
    owner: team-mobile
    domain: mobile
    tier: standard
    purpose: Sample Android app for testing the extractor.
    status: active
    slack: "#team-mobile"
    keywords:
      - banking
      - android
      - mobile
    integration_notes:
      - scope: global
        note: "Uses custom auth flow via AuthManager"

  - name: sample-ios
    path: tests/fixtures/sample-ios-repo
    type: ios
    owner: team-mobile
    domain: mobile
    tier: standard
    purpose: Sample iOS app for testing the extractor.
    status: active
    slack: "#team-mobile"
    keywords:
      - banking
      - ios
      - mobile
    integration_notes:
      - scope: global
        note: "Uses biometric auth for sensitive operations"
